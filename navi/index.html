<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>呉羽いきいきバス 行路表示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Oswald:wght@600;700&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#2a3550;
    --accent:#00d4ff; --accent2:#ff6b35; --green:#00e676; --yellow:#ffeb3b;
    --red:#ff4444; --text:#e8edf5; --muted:#6b7a99;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'BIZ UDPGothic',sans-serif;min-height:100dvh;overflow-x:hidden;}

  #selector{display:flex;flex-direction:column;min-height:100dvh;padding:20px 16px 30px;}
  .app-title{text-align:center;margin-bottom:20px;}
  .app-title h1{font-size:1.3rem;font-weight:700;color:var(--accent);}
  .app-title p{font-size:0.75rem;color:var(--muted);margin-top:4px;}
  .sel-label{font-size:0.72rem;font-weight:700;letter-spacing:0.12em;color:var(--muted);margin-bottom:8px;margin-top:18px;}
  .two-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .sel-btn{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 10px;color:var(--text);font-family:'BIZ UDPGothic',sans-serif;font-size:0.95rem;font-weight:700;text-align:center;cursor:pointer;line-height:1.5;}
  .sel-btn:active,.sel-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .sel-btn .badge{display:block;font-size:0.62rem;font-weight:400;margin-top:4px;opacity:0.7;}
  .flight-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .flight-btn{background:var(--surface);border:2px solid var(--border);border-radius:8px;padding:10px 4px;color:var(--text);font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;cursor:pointer;}
  .flight-btn small{display:block;font-family:'BIZ UDPGothic',sans-serif;font-size:0.6rem;margin-top:2px;opacity:0.75;}
  .flight-btn:active,.flight-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}
  .start-btn{background:var(--green);border:none;border-radius:14px;padding:16px;font-family:'BIZ UDPGothic',sans-serif;font-size:1.1rem;font-weight:700;color:#000;cursor:pointer;margin-top:24px;}
  .start-btn:disabled{background:var(--border);color:var(--muted);}

  #run-screen{display:none;flex-direction:column;min-height:100dvh;}
  #header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:2px solid var(--border);padding:10px 16px 8px;}
  .route-line{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .route-badge{background:var(--accent);color:#000;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;padding:2px 10px;border-radius:4px;}
  .route-name{font-size:0.9rem;font-weight:700;flex:1;}
  .status-bar{display:flex;justify-content:space-between;align-items:center;}
  .clock{font-family:'Oswald',sans-serif;font-size:2.6rem;font-weight:700;color:var(--accent);letter-spacing:0.05em;line-height:1;}
  .delay-badge{font-size:1.4rem;font-weight:700;padding:3px 10px;border-radius:20px;border:2px solid;}
  .d-ok{color:var(--green);border-color:var(--green);}
  .d-warn{color:var(--yellow);border-color:var(--yellow);}
  .d-late{color:var(--red);border-color:var(--red);}
  .gps-bar{display:flex;align-items:center;gap:6px;padding:4px 16px;background:#0d1422;font-size:0.7rem;color:var(--muted);border-bottom:1px solid var(--border);}
  .gps-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
  .gps-dot.searching{background:var(--yellow);animation:blink 0.5s infinite;}
  .gps-dot.off{background:var(--red);animation:none;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  #approach-banner{display:none;position:sticky;top:0;z-index:95;background:var(--green);color:#000;text-align:center;padding:12px;font-weight:700;font-size:1.5rem;animation:flash 0.8s infinite;}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:0.6}}
  #stop-list{padding:8px 0 30px;}
  .stop-item{display:flex;align-items:stretch;padding:0 16px;min-height:62px;border-bottom:1px solid var(--border);transition:background 0.3s;}
  .stop-item.passed{display:none;}
  .stop-item.passed.last{display:flex;opacity:0.45;}
  .stop-item.current{background:rgba(0,212,255,0.1);border-left:4px solid var(--accent);}
  .stop-item.next{background:rgba(255,107,53,0.35);border-left:4px solid var(--accent2);}
  .stop-item.notime{opacity:0.5;}
  .timeline{display:flex;flex-direction:column;align-items:center;width:28px;padding:0 4px;flex-shrink:0;}
  .tl-top{width:2px;flex:1;background:var(--border);}
  .tl-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border);background:var(--bg);flex-shrink:0;}
  .stop-item.passed .tl-dot{background:#2a3550;border-color:#3d4f6e;}
  .stop-item.current .tl-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent);}
  .stop-item.next .tl-dot{background:var(--accent2);border-color:var(--accent2);}
  .tl-bot{width:2px;flex:1;background:var(--border);}
  .stop-content{flex:1;display:flex;align-items:center;justify-content:space-between;padding:8px 0 8px 8px;}
  .stop-info{flex:1;}
  .stop-num{font-size:0.62rem;color:var(--muted);margin-bottom:2px;}
  .stop-name{font-size:1.2rem;font-weight:700;line-height:1.2;}
  .stop-item.passed .stop-name{color:#3d4f6e;}
  .stop-item.current .stop-name{color:var(--accent);font-size:1.6rem;}
  .stop-item.next .stop-name{color:#fff;font-size:1.6rem;}
  .stop-dist{font-size:0.7rem;color:var(--muted);margin-top:2px;}
  .time-block{text-align:right;flex-shrink:0;}
  .sched-time{font-family:'Oswald',sans-serif;font-size:1.55rem;font-weight:700;line-height:1;}
  .stop-item.passed .sched-time{color:#3d4f6e;}
  .stop-item.current .sched-time{color:var(--accent);font-size:2.2rem;}
  .stop-item.next .sched-time{color:var(--accent2);font-size:2.2rem;}
  .diff-time{font-size:1rem;font-weight:700;text-align:right;margin-top:2px;}
  .d-e{color:var(--red);}.d-o{color:var(--muted);}.d-l{color:var(--muted);}
  .back-btn{position:fixed;top:14px;right:16px;z-index:400;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:0.72rem;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'BIZ UDPGothic',sans-serif;}
  .manual-btn{position:fixed;bottom:16px;right:16px;z-index:300;background:var(--surface2);border:2px solid var(--border);color:var(--muted);font-size:0.72rem;padding:8px 12px;border-radius:8px;cursor:pointer;font-family:'BIZ UDPGothic',sans-serif;}
</style>
</head>
<body>

<div id="selector">
  <div class="app-title">
    <h1>🚌 呉羽いきいきバス</h1>
    <p>行路時刻表示システム</p>
  </div>

  <div class="sel-label">① ルート選択</div>
  <div class="two-btns">
    <button class="sel-btn" onclick="selectRoute('nkm', this)">長岡・寒江<br>モーニング<span class="badge">通学便</span></button>
    <button class="sel-btn" onclick="selectRoute('oim', this)">老田・古沢・池多<br>モーニング<span class="badge">通学便</span></button>
    <button class="sel-btn" onclick="selectRoute('nk', this)">長岡・寒江ルート<span class="badge">通常便 1〜10便</span></button>
    <button class="sel-btn" onclick="selectRoute('oi', this)">老田・古沢・池多<br>通常便<span class="badge">1,3,5,7,9,10便</span></button>
    <div></div>
    <button class="sel-btn" onclick="selectRoute('mk', this)">老田・古沢・池多<br>三熊便<span class="badge">2,4,6,8便</span></button>
  </div>

  <div id="flight-section" style="display:none;">
    <div class="sel-label">② 便選択</div>
    <div class="flight-grid" id="flight-grid"></div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startRun()" disabled>▶ この便を表示する</button>
</div>

<div id="run-screen">
  <div id="header">
    <div class="route-line">
      <span class="route-badge" id="rte-badge">系統</span>
      <span class="route-name" id="rte-name">---</span>
    </div>
    <div class="status-bar">
      <div class="clock" id="clock">--:--:--</div>
      <div class="delay-badge d-ok" id="delay-badge">---</div>
    </div>
  </div>
  <div class="gps-bar">
    <div class="gps-dot searching" id="gps-dot"></div>
    <span id="gps-text">GPS取得中...</span>
  </div>
  <div id="approach-banner">🚏 バス停に接近しています</div>
  <div id="stop-list"></div>
  <button class="manual-btn" onclick="manualAdvance()">手動 ▶</button>
  <button class="back-btn" onclick="goBack()">◀ 便選択</button>
</div>

function nowSec(){var n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();}

};

// ===== 状態 =====
var selectedRoute=null, selectedFlight=null;
var currentStopIdx=0, activeStops=[], activeGeo=[];
var clockTimer=null, gpsWatchId=null;
var currentLat=null, currentLon=null;

// ===== 便選択 =====
function selectRoute(key, btn) {
  selectedRoute=key; selectedFlight=null;
  document.querySelectorAll('.sel-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var r=ROUTES[key], grid=document.getElementById('flight-grid');
  grid.innerHTML='';
  if(r.single) {
    selectedFlight='single';
    document.getElementById('flight-section').style.display='none';
    document.getElementById('start-btn').disabled=false;
  } else {
    document.getElementById('flight-section').style.display='block';
    Object.keys(r.flights).forEach(function(fn){
      var times=r.flights[fn], first=times[0]||'';
      var b=document.createElement('button');
      b.className='flight-btn';
      b.innerHTML=fn+'便<small>'+first+'</small>';
      b.onclick=(function(f,el){return function(){selectFlight(f,el);};})(fn,b);
      grid.appendChild(b);
    });
    document.getElementById('start-btn').disabled=true;
  }
}

function selectFlight(fn, btn) {
  selectedFlight=fn;
  document.querySelectorAll('.flight-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('start-btn').disabled=false;
}

// ===== 運行開始 =====
function startRun() {
  var r=ROUTES[selectedRoute];
  var times=r.single ? Object.values(r.flights)[0] : r.flights[selectedFlight];
  activeStops=[]; activeGeo=[];
  for(var i=0;i<r.stops.length;i++){
    activeStops.push({name:r.stops[i], time:times[i]||null});
    activeGeo.push(r.geo[i]||{lat:0,lon:0});
  }
  currentStopIdx=0;
  document.getElementById('rte-badge').textContent=r.badge;
  var fn=r.single?'　通学便':'　'+selectedFlight+'便';
  document.getElementById('rte-name').textContent=r.name+fn;
  document.getElementById('selector').style.display='none';
  var rs=document.getElementById('run-screen');
  rs.style.display='flex'; rs.style.flexDirection='column';
  renderStops(); startClock(); initGPS(); startWakeLock();
}

function goBack() {
  document.getElementById('run-screen').style.display='none';
  document.getElementById('selector').style.display='flex';
  clearInterval(clockTimer);
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
}

function manualAdvance() {
  if(currentStopIdx<activeStops.length-1){
    currentStopIdx++;
    document.getElementById('approach-banner').style.display='none';
    renderStops();
  }
}

// ===== GPS =====
function initGPS() {
  var dot=document.getElementById('gps-dot'), txt=document.getElementById('gps-text');
  if(!navigator.geolocation){dot.className='gps-dot off';txt.textContent='GPS非対応';return;}
  gpsWatchId=navigator.geolocation.watchPosition(
    function(pos){
      currentLat=pos.coords.latitude; currentLon=pos.coords.longitude;
      dot.className='gps-dot';
      txt.textContent='GPS取得済 ±'+Math.round(pos.coords.accuracy)+'m';
      checkApproach(); updateDistances();
    },
    function(err){
      dot.className='gps-dot off';
      if(err.message&&err.message.indexOf('permissions policy')!==-1) txt.textContent='GPS：プレビュー環境では無効（実機では動作します）';
      else if(err.code===1) txt.textContent='GPS：位置情報の許可が必要です';
      else txt.textContent='GPS取得失敗';
    },
    {enableHighAccuracy:true,maximumAge:3000,timeout:10000}
  );
}

function checkApproach() {
  if(currentLat===null||currentStopIdx>=activeStops.length-1) return;
  var cg=activeGeo[currentStopIdx], ng=activeGeo[currentStopIdx+1];
  if(!ng||!ng.lat) return;
  var dc=calcDist(currentLat,currentLon,cg.lat,cg.lon);
  var dn=calcDist(currentLat,currentLon,ng.lat,ng.lon);
  if(dn<50&&dn<dc){currentStopIdx++;document.getElementById('approach-banner').style.display='none';renderStops();return;}
  var banner=document.getElementById('approach-banner');
  if(dn<150){banner.textContent='🚏 まもなく '+activeStops[currentStopIdx+1].name+'（'+Math.round(dn)+'m）';banner.style.display='block';}
  else{banner.style.display='none';}
}

function updateDistances() {
  if(currentLat===null) return;
  [currentStopIdx,currentStopIdx+1].forEach(function(i){
    if(i>=activeGeo.length) return;
    var el=document.getElementById('dist-'+i);
    if(!el||!activeGeo[i]||!activeGeo[i].lat) return;
    el.textContent=Math.round(calcDist(currentLat,currentLon,activeGeo[i].lat,activeGeo[i].lon))+'m';
  });
}

// ===== スリープ防止 =====
function startWakeLock() {
  try {
    var v=document.createElement('video');
    v.setAttribute('playsinline',''); v.setAttribute('muted','');

// ===== レンダリング =====
function diffLabel(sec){
  var d=nowSec()-sec;
  if(d<0) return{cls:'d-e',text:Math.ceil(-d/60)+'分早'};
  if(d<60) return{cls:'d-o',text:'定刻'};
  return{cls:'d-l',text:Math.floor(d/60)+'分遅'};
}

function renderStops() {
  var list=document.getElementById('stop-list');
  list.innerHTML='';
  var totalVisible = activeStops.filter(function(s){return s.time;}).length;
  var visibleIdx = 0;
  activeStops.forEach(function(stop,i){
    var div=document.createElement('div');
    div.className='stop-item'; div.id='s'+i;
    var isPassed=i<currentStopIdx, isLast=i===currentStopIdx-1;
    var isCurrent=i===currentStopIdx, isNext=i===currentStopIdx+1;
    if(isPassed) div.classList.add('passed');
    if(isLast)   div.classList.add('last');
    if(isCurrent) div.classList.add('current');
    if(isNext)    div.classList.add('next');
    if(!stop.time) { list.appendChild(div); div.style.display='none'; return; }
    visibleIdx++;
    var sec=timeToSec(stop.time);
    var diff=(sec&&isCurrent)?diffLabel(sec):null;
    var showDist=isCurrent||isNext;
    div.innerHTML=
      '<div class="timeline"><div class="tl-top"></div><div class="tl-dot"></div><div class="tl-bot"></div></div>'+
      '<div class="stop-content">'+
        '<div class="stop-info">'+
          '<div class="stop-num">'+visibleIdx+' / '+totalVisible+'</div>'+
          '<div class="stop-name">'+stop.name+'</div>'+
          (showDist?'<div class="stop-dist" id="dist-'+i+'">---m</div>':'')+
        '</div>'+
        '<div class="time-block">'+
          '<div class="sched-time">'+(stop.time||'―')+'</div>'+
          (diff?'<div class="diff-time '+diff.cls+'">'+diff.text+'</div>':'')+
        '</div>'+
      '</div>';
    if(isCurrent){div.addEventListener('click',function(){manualAdvance();});div.style.cursor='pointer';}
    list.appendChild(div);
  });
  updateDelay();
  if(currentLat!==null) updateDistances();
  var el=document.getElementById('s'+currentStopIdx);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateDelay() {
  var cur=activeStops[currentStopIdx]; if(!cur||!cur.time) return;
  var d=nowSec()-timeToSec(cur.time);
  var badge=document.getElementById('delay-badge');
  if(d<0){badge.textContent=Math.ceil(-d/60)+'分早発';badge.className='delay-badge d-late';}
  else if(d<60){badge.textContent='定刻';badge.className='delay-badge d-ok';}
  else{badge.textContent=Math.floor(d/60)+'分遅延';badge.className='delay-badge d-ok';}
}

function startClock() {
  function tick(){
    var n=new Date();
    document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
    updateDelay();
  }
  tick(); clockTimer=setInterval(tick,1000);
}
</script>
