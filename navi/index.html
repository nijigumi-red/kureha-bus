<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>呉羽いきいきバス 行路表示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Oswald:wght@600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #2a3550;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00e676;
    --yellow: #ffeb3b;
    --red: #ff4444;
    --text: #e8edf5;
    --muted: #6b7a99;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'BIZ UDPGothic', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  #selector {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: 20px 16px 30px;
  }

  .app-title { text-align: center; margin-bottom: 24px; }
  .app-title h1 { font-size: 1.3rem; font-weight: 900; color: var(--accent); letter-spacing: 0.05em; }
  .app-title p  { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  .sel-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 8px; margin-top: 20px;
  }

  .route-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .route-btn {
    background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 10px; color: var(--text); font-family: 'BIZ UDPGothic', sans-serif;
    font-size: 0.88rem; font-weight: 700; text-align: center; cursor: pointer;
    transition: all 0.15s; line-height: 1.4;
  }
  .route-btn:active, .route-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .route-btn .badge { display: block; font-size: 0.65rem; font-weight: 400; margin-top: 4px; opacity: 0.7; }

  .flight-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

  .flight-btn {
    background: var(--surface); border: 2px solid var(--border); border-radius: 8px;
    padding: 10px 4px; color: var(--text); font-family: 'Oswald', sans-serif;
    font-size: 1.1rem; font-weight: 700; text-align: center; cursor: pointer;
    transition: all 0.15s;
  }
  .flight-btn:active, .flight-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .flight-btn small {
    display: block; font-family: 'BIZ UDPGothic', sans-serif;
    font-size: 0.6rem; font-weight: 400; margin-top: 2px; opacity: 0.75;
  }

  .start-btn {
    background: var(--green); border: none; border-radius: 14px; padding: 16px;
    font-family: 'BIZ UDPGothic', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: #000; cursor: pointer; margin-top: 28px; letter-spacing: 0.05em;
  }
  .start-btn:disabled { background: var(--border); color: var(--muted); }

  #run-screen { display: none; flex-direction: column; min-height: 100dvh; }

  #header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 10px 16px 8px;
  }
  .route-line { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .route-badge {
    background: var(--accent); color: #000;
    font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700;
    padding: 2px 10px; border-radius: 4px;
  }
  .route-name { font-size: 0.9rem; font-weight: 700; flex: 1; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; }
  .clock {
    font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 700;
    color: var(--accent); letter-spacing: 0.05em; line-height: 1;
  }
  .delay-badge { font-size: 0.82rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; border: 2px solid; }
  .d-ok   { color: var(--green);  border-color: var(--green); }
  .d-warn { color: var(--yellow); border-color: var(--yellow); }
  .d-late { color: var(--red);    border-color: var(--red); }

  .gps-bar {
    display: flex; align-items: center; gap: 6px; padding: 4px 16px;
    background: #0d1422; font-size: 0.7rem; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .gps-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation: blink 2s infinite; }
  .gps-dot.searching { background: var(--yellow); animation: blink 0.5s infinite; }
  .gps-dot.off { background: var(--red); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #stop-list { padding: 8px 0 90px; }

  .stop-item {
    display: flex; align-items: stretch; padding: 0 16px; min-height: 62px;
    border-bottom: 1px solid var(--border); transition: background 0.3s;
  }
  .stop-item.passed  { opacity: 0.35; }
  .stop-item.current { background: rgba(0,212,255,0.08); border-left: 4px solid var(--accent); }
  .stop-item.next    { background: rgba(255,107,53,0.08); border-left: 4px solid var(--accent2); }

  .timeline { display:flex; flex-direction:column; align-items:center; width:28px; padding:0 4px; flex-shrink:0; }
  .tl-top { width:2px; flex:1; background: var(--border); }
  .tl-dot { width:11px; height:11px; border-radius:50%; border:2px solid var(--border); background:var(--bg); flex-shrink:0; }
  .stop-item.passed  .tl-dot { background:#2a3550; border-color:#3d4f6e; }
  .stop-item.current .tl-dot { background:var(--accent); border-color:var(--accent); box-shadow:0 0 8px var(--accent); }
  .stop-item.next    .tl-dot { background:var(--accent2); border-color:var(--accent2); }
  .tl-bot { width:2px; flex:1; background: var(--border); }

  .stop-content { flex:1; display:flex; align-items:center; justify-content:space-between; padding:8px 0 8px 8px; }
  .stop-info { flex:1; }
  .stop-num  { font-size:0.62rem; color:var(--muted); margin-bottom:2px; }
  .stop-name { font-size:1.1rem; font-weight:700; line-height:1.2; }
  .stop-item.passed  .stop-name { color:#3d4f6e; }
  .stop-item.current .stop-name { color:var(--accent); font-size:1.2rem; }
  .stop-item.next    .stop-name { color:#fff; }
  .stop-note { font-size:0.68rem; color:var(--muted); margin-top:2px; }

  .time-block { text-align:right; flex-shrink:0; }
  .sched-time { font-family:'Oswald',sans-serif; font-size:1.55rem; font-weight:700; line-height:1; }
  .stop-item.passed  .sched-time { color:#3d4f6e; }
  .stop-item.current .sched-time { color:var(--accent); font-size:1.75rem; }
  .stop-item.next    .sched-time { color:var(--accent2); }
  .diff-time { font-size:0.7rem; font-weight:700; text-align:right; margin-top:2px; }
  .d-e { color:var(--green); } .d-o { color:var(--muted); } .d-l { color:var(--red); }

  #next-float {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--accent2); padding:10px 20px;
    display:flex; justify-content:space-between; align-items:center;
    z-index:200; box-shadow:0 -4px 20px rgba(0,0,0,0.5);
  }
  .nf-label { font-size:0.7rem; font-weight:700; letter-spacing:0.15em; color:rgba(255,255,255,0.7); }
  .nf-name  { font-size:1.35rem; font-weight:900; color:#fff; line-height:1.1; }
  .nf-time  { font-family:'Oswald',sans-serif; font-size:2rem; font-weight:700; color:#fff; }

  .back-btn {
    position:fixed; top:14px; right:16px; z-index:400;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); font-size:0.72rem; padding:5px 10px;
    border-radius:6px; cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  }
</style>
</head>
<body>

<!-- 便選択画面 -->
<div id="selector">
  <div class="app-title">
    <h1>🚌 呉羽いきいきバス</h1>
    <p>行路時刻表示システム</p>
  </div>

  <div class="sel-label">ルート選択</div>
  <div class="route-btns">
    <button class="route-btn" onclick="selectRoute('nagaoka', this)">
      長岡・寒江ルート
      <span class="badge">通常便 1〜9便</span>
    </button>
    <button class="route-btn" onclick="selectRoute('morning_nk', this)">
      長岡・寒江<br>モーニング
      <span class="badge">朝の通学便</span>
    </button>
    <button class="route-btn" onclick="selectRoute('oita', this)">
      老田・古沢・池多<br>通常便
      <span class="badge">1,3,5,7,9,10便</span>
    </button>
    <button class="route-btn" onclick="selectRoute('mikuma', this)">
      老田・古沢・池多<br>三熊便
      <span class="badge">2,4,6,8便</span>
    </button>
    <button class="route-btn" onclick="selectRoute('morning_oi', this)">
      老田・古沢・池多<br>モーニング
      <span class="badge">朝の通学便</span>
    </button>
  </div>

  <div id="flight-section" style="display:none;">
    <div class="sel-label" style="margin-top:20px;">便数選択</div>
    <div class="flight-grid" id="flight-grid"></div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startRun()" disabled>
    ▶ この便を表示する
  </button>
</div>

<!-- 運行画面 -->
<div id="run-screen">
  <div id="header">
    <div class="route-line">
      <span class="route-badge" id="rte-badge">系統</span>
      <span class="route-name"  id="rte-name">---</span>
    </div>
    <div class="status-bar">
      <div class="clock" id="clock">--:--:--</div>
      <div class="delay-badge d-ok" id="delay-badge">---</div>
    </div>
  </div>
  <div class="gps-bar">
    <div class="gps-dot searching" id="gps-dot"></div>
    <span id="gps-text">GPS取得中...</span>
  </div>
  <div id="stop-list"></div>
  <div id="next-float">
    <div>
      <div class="nf-label">次停留所</div>
      <div class="nf-name" id="float-stop">---</div>
    </div>
    <div class="nf-time" id="float-time">--:--</div>
  </div>
  <button class="back-btn" onclick="goBack()">◀ 便選択</button>
</div>

// ===================================================
// 1. ユーティリティ（最初に定義）
// ===================================================
function pad(n) { return String(n).padStart(2, '0'); }

function timeToMin(t) {
  if (!t) return null;
  var parts = t.split(':');
  return Number(parts[0]) * 60 + Number(parts[1]);
}

function nowMin() {
  var n = new Date();
  return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;
}

// flat配列 [h,m, h,m, ...] + バス停名配列 → stops配列
function buildStops(names, flat) {
  var stops = [];
  for (var i = 0; i < names.length; i++) {
    var h = flat[i * 2];
    var m = flat[i * 2 + 1];
    if (h != null && m != null) {
      stops.push({ name: names[i], time: pad(h) + ':' + pad(m) });
    }
  }
  return stops;
}

// ===================================================
// 4. アプリ状態
// ===================================================
var selectedRoute = null;
var selectedFlight = null;
var currentStopIdx = 0;
var activeStops = [];
var clockTimer = null;

// ===================================================
// 5. 便選択ロジック
// ===================================================
function selectRoute(key, btn) {
  selectedRoute = key;
  selectedFlight = null;
  document.querySelectorAll('.route-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  var sc = SCHEDULES[key];
  var fsec = document.getElementById('flight-section');
  var grid = document.getElementById('flight-grid');
  grid.innerHTML = '';

  if (sc.singleFlight) {
    fsec.style.display = 'none';
    selectedFlight = 'single';
    document.getElementById('start-btn').disabled = false;
  } else {
    fsec.style.display = 'block';
    Object.keys(sc.flights).forEach(function(fn) {
      var firstTime = sc.flights[fn][0] ? sc.flights[fn][0].time : '';
      var b = document.createElement('button');
      b.className = 'flight-btn';
      b.innerHTML = fn + '便<small>' + firstTime + '</small>';
      b.onclick = (function(f, el) {
        return function() { selectFlight(f, el); };
      })(fn, b);
      grid.appendChild(b);
    });
    document.getElementById('start-btn').disabled = true;
  }
}

function selectFlight(fn, btn) {
  selectedFlight = fn;
  document.querySelectorAll('.flight-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('start-btn').disabled = false;
}

function startRun() {
  var sc = SCHEDULES[selectedRoute];
  activeStops = sc.singleFlight ? sc.stops : sc.flights[selectedFlight];
  currentStopIdx = 0;

  document.getElementById('rte-badge').textContent = sc.badge;
  var fn = (selectedFlight === 'single') ? '' : ('　' + selectedFlight + '便');
  document.getElementById('rte-name').textContent = sc.name + fn;

  document.getElementById('selector').style.display = 'none';
  var rs = document.getElementById('run-screen');
  rs.style.display = 'flex';
  rs.style.flexDirection = 'column';

  renderStops();
  startClock();
  initGPS();
}

function goBack() {
  document.getElementById('run-screen').style.display = 'none';
  document.getElementById('selector').style.display = 'flex';
  clearInterval(clockTimer);
}

// ===================================================
// 6. 運行画面レンダリング
// ===================================================
function diffLabel(schedMin) {
  var d = Math.round(nowMin() - schedMin);
  if (d <= -1) return { cls:'d-e', text: Math.abs(d) + '分早' };
  if (d <=  2) return { cls:'d-o', text: '定刻' };
  return { cls:'d-l', text: d + '分遅' };
}

function renderStops() {
  var list = document.getElementById('stop-list');
  list.innerHTML = '';

  activeStops.forEach(function(stop, i) {
    var div = document.createElement('div');
    div.className = 'stop-item';
    div.id = 's' + i;

    var isPassed  = i < currentStopIdx;
    var isCurrent = i === currentStopIdx;
    var isNext    = i === currentStopIdx + 1;

    if (isPassed)  div.classList.add('passed');
    if (isCurrent) div.classList.add('current');
    if (isNext)    div.classList.add('next');

    var schedMin = timeToMin(stop.time);
    var diff = (schedMin && isCurrent) ? diffLabel(schedMin) : null;

    div.innerHTML =
      '<div class="timeline">' +
        '<div class="tl-top"></div>' +
        '<div class="tl-dot"></div>' +
        '<div class="tl-bot"></div>' +
      '</div>' +
      '<div class="stop-content">' +
        '<div class="stop-info">' +
          '<div class="stop-num">' + (i + 1) + ' / ' + activeStops.length + '</div>' +
          '<div class="stop-name">' + stop.name + '</div>' +
          (stop.note ? '<div class="stop-note">📌 ' + stop.note + '</div>' : '') +
        '</div>' +
        '<div class="time-block">' +
          '<div class="sched-time">' + (stop.time || '--:--') + '</div>' +
          (diff ? '<div class="diff-time ' + diff.cls + '">' + diff.text + '</div>' : '') +
        '</div>' +
      '</div>';

    if (isCurrent) {
      div.addEventListener('click', (function(idx) {
        return function() {
          if (currentStopIdx < activeStops.length - 1) {
            currentStopIdx++;
            renderStops();
          }
        };
      })(i));
      div.style.cursor = 'pointer';
    }

    list.appendChild(div);
  });

  updateFloat();
  updateDelay();
  var el = document.getElementById('s' + currentStopIdx);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateFloat() {
  var ni = currentStopIdx + 1;
  if (ni < activeStops.length) {
    document.getElementById('float-stop').textContent = activeStops[ni].name;
    document.getElementById('float-time').textContent = activeStops[ni].time || '--:--';
  } else {
    var cur = activeStops[currentStopIdx];
    document.getElementById('float-stop').textContent = (cur ? cur.name : '') + '（終点）';
    document.getElementById('float-time').textContent = cur ? cur.time : '--:--';
  }
}

function updateDelay() {
  var cur = activeStops[currentStopIdx];
  if (!cur || !cur.time) return;
  var d = Math.round(nowMin() - timeToMin(cur.time));
  var badge = document.getElementById('delay-badge');
  if (d <= -1)     { badge.textContent = Math.abs(d) + '分早発'; badge.className = 'delay-badge d-ok'; }
  else if (d <= 2) { badge.textContent = '定刻';                 badge.className = 'delay-badge d-ok'; }
  else if (d <= 5) { badge.textContent = d + '分遅延';           badge.className = 'delay-badge d-warn'; }
  else             { badge.textContent = d + '分遅延';           badge.className = 'delay-badge d-late'; }
}

function startClock() {
  function tick() {
    var n = new Date();
    document.getElementById('clock').textContent =
      pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
    updateDelay();
  }
  tick();
  clockTimer = setInterval(tick, 1000);
}

function initGPS() {
  var dot = document.getElementById('gps-dot');
  var txt = document.getElementById('gps-text');
  if (!navigator.geolocation) {
    dot.className = 'gps-dot off';
    txt.textContent = 'GPS非対応';
    return;
  }
  navigator.geolocation.watchPosition(
    function(pos) {
      dot.className = 'gps-dot';
      txt.textContent = 'GPS取得済 ' +
        pos.coords.latitude.toFixed(5) + ', ' +
        pos.coords.longitude.toFixed(5) +
        '  ±' + Math.round(pos.coords.accuracy) + 'm';
    },
    function(err) {
      dot.className = 'gps-dot off';
      if (err.message && err.message.indexOf('permissions policy') !== -1) {
        txt.textContent = 'GPS：プレビュー環境では無効（GitHub Pages実機では動作します）';
      } else if (err.code === 1) {
        txt.textContent = 'GPS：位置情報の許可が必要です';
      } else {
        txt.textContent = 'GPS取得失敗（' + err.message + '）';
      }
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}
